<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
</head>
<body>

<h2>User Registration</h2>

<form th:action="@{/register}" method="post">

    <input type="text"
           name="fullName"
           placeholder="Full Name">

    <br><br>

    <input type="email"
           name="email"
           placeholder="Email">

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password">

    <br><br>

    <input type="text"
           name="phoneNumber"
           placeholder="Phone Number">

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
