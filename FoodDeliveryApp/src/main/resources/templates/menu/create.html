<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Menu Item</title>
</head>
<body>

<h2>Add Menu Item</h2>

<form th:action="@{/admin/menu/create}"
      th:object="${request}"
      method="post">

    <!-- Hidden Restaurant Id -->
    <input type="hidden"
           th:field="*{restaurantId}" />

    <label>Food Name</label><br>
    <input type="text"
           th:field="*{name}" />
    <br><br>

    <label>Description</label><br>
    <textarea
            th:field="*{description}">
    </textarea>
    <br><br>

    <label>Price</label><br>
    <input type="number"
           step="0.01"
           th:field="*{price}" />
    <br><br>

    <label>Available</label>
    <input type="checkbox"
           th:field="*{available}" />
    <br><br>

    <button type="submit">
        Save Menu Item
    </button>

</form>

<br>

<a th:href="@{/admin/restaurants}">
    Back to Restaurants
</a>

</body>
</html>
