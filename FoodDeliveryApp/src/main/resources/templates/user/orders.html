<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders</title>
</head>
<body>

<h2>My Orders</h2>

<table border="1">

    <thead>
    <tr>
        <th>Order ID</th>
        <th>Total Amount</th>
        <th>Status</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="order : ${orders}">

        <td th:text="${order.id}"></td>

        <td th:text="${order.totalAmount}"></td>

        <td th:text="${order.status}"></td>

    </tr>

    </tbody>

</table>

</body>
</html>
