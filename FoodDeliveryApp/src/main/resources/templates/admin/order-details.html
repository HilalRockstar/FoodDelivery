<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Order Details</title>
</head>

<body>

<h2>Order Details</h2>

<p>
    <b>Order ID :</b>
    <span th:text="${order.id}"></span>
</p>

<p>
    <b>Customer :</b>
    <span th:text="${order.user.fullName}"></span>
</p>

<p>
    <b>Email :</b>
    <span th:text="${order.user.email}"></span>
</p>

<p>
    <b>Total :</b>
    <span th:text="${order.totalAmount}"></span>
</p>

<p>
    <b>Status :</b>
    <span th:text="${order.status}"></span>
</p>

<hr>

<h3>Order Items</h3>

<table border="1">

    <tr>

        <th>Food</th>

        <th>Price</th>

        <th>Quantity</th>

        <th>Total</th>

    </tr>

    <tr th:each="item : ${order.orderItems}">

        <td th:text="${item.menuItem.name}"></td>

        <td th:text="${item.price}"></td>

        <td th:text="${item.quantity}"></td>

        <td th:text="${item.price * item.quantity}"></td>

    </tr>

</table>

<hr>
<h3>Assign Delivery Partner</h3>

<form th:action="@{/admin/orders/assign-delivery}"
      method="post">

    <input type="hidden"
           name="orderId"
           th:value="${order.id}">

    <select name="deliveryPartnerId">

        <option
                th:each="partner : ${deliveryPartners}"
                th:value="${partner.id}"
                th:text="${partner.fullName}">
        </option>

    </select>

    <button type="submit">
        Assign
    </button>

</form>

<h3>Update Status</h3>

<form th:action="@{/admin/orders/update-status}" method="post">

    <input
            type="hidden"
            name="orderId"
            th:value="${order.id}">

    <select name="status">

        <option value="PENDING">Pending</option>

        <option value="CONFIRMED">Confirmed</option>

        <option value="PREPARING">Preparing</option>

        <option value="OUT_FOR_DELIVERY">Out For Delivery</option>

        <option value="DELIVERED">Delivered</option>

    </select>

    <button type="submit">

        Update Status

    </button>

</form>

<br>

<a th:href="@{/admin/orders}">
    ← Back
</a>

</body>
</html>
